<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inicio_Sesion</title>
     <link rel="stylesheet" href="styles/styles.css">
     
</head>
<body>
    <h2>Inicio de Sesión</h2>
    <h3>Seleccione su Rol</h3>

    <input type="radio" id="Administrador" name="Administrador" value="Administrador" required>
    <label for="Administrador">Administrador</label><br>

    <input type="radio" id="Docente" name="Docente" value="Docente" required>
    <label for="Docente">Docente</label><br>

    <input type="radio" id="Estudiante" name="Estudiante" value="Estudiante" required>
    <label for="Estudiante">Estudiante</label><br><br>


    <!--Ingresar usuario-->
    <fieldset>
    <legend>Ingrese sus datos</legend>
    
    <label for="nombre">Nombre completo:</label><br>
    <input type="text" id="nombre" name="nombre" placeholder="nombre y Apellido" required><br><br>

    <form onsubmit="return validartelefono()">
    <label for="telefono">Numero de telefono:</label><br>
    <input type="tel" id="telefono" placeholder="ej:1234567890" required><br><br>

    <label for="password">Contraseña:</label><br>
    <input type="password" id="password" name="password" placeholder="Contraseña" required><br><br>

    <legend>Enviar datos</legend>

     <button type="submit">Subir datos</button>
     <button type="reset">Limpiar datos</button>
     <button type="button">Mostrar ayuda</button>
   </fieldset>

</body>
</html>
