<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión</title>
    <link rel="stylesheet" href="styles y scrip/styles.css">
</head>

<body>
    <div class="video-fondo">
        <video autoplay muted loop>
            <source src="./imagenes y video/mentoria.mp4" type="video/mp4">
            Tu navegador no soporta el elemento de video.
        </video>
    </div>
    <div class="cuerpo">
        <div class="div-container">
            <div class="divRolPanel-rol-panel" id="rolPanel">
                <div class="div-titulo">
                    <h1>Sistema Educativo</h1>
                    <p>Selecciona tu rol</p>
                </div>

                <div class="roles">
                    <div class="card" onclick="seleccionarRol('administrador')">
                        <h2>👨‍💼</h2>
                        <h3>Administrador</h3>
                        <p>Gestiona usuarios y sistema</p>
                    </div>

                    <div class="card" onclick="seleccionarRol('docente')">
                        <h2>👨‍🏫</h2>
                        <h3>Docente</h3>
                        <p>Administra cursos y notas</p>
                    </div>

                    <div class="card" onclick="seleccionarRol('estudiante')">
                        <h2>👨‍🎓</h2>
                        <h3>Estudiante</h3>
                        <p>Consulta materias y progreso</p>
                    </div>
                </div>
            </div>
            <div class="divLoginPanel-login-panel" id="loginPanel" style="display: none;">
                <button class="btn-atras" onclick="volverARoles()">← Atrás</button>

                <div class="login-izquierda">
                    <img src="./imagenes y video/istockphoto-1781526520-612x612.webp" alt="Biblioteca" class="biblioteca-img">

                    <div class="login-contenido-izq">
                        <h1 class="bienvenido-texto">Bienvenido</h1>
                        <p class="frase-texto">La educación es el arma más poderosa para cambiar el mundo.</p>
                    </div>
                </div>

                <div class="login-derecha">
                    <div class="titulo-login">
                        <h2>Iniciar Sesión</h2>
                        <p id="rolSubtitulo">Administrador</p>
                    </div>

                    <form onsubmit="iniciarSesion(event)" id="formLogin">
                        <div class="form-group">
                            <label>Nombre de Usuario</label>
                            <input type="text" id="username" placeholder="Ingresa tu nombre" required>
                        </div>

                        <div class="form-group">
                            <label>Contraseña</label>
                            <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
                        </div>
                        <div <button type="button" class="btn-ingresar" onclick="iniciarSesion(event)">Ingresar</button>
                    </form>
                </div>
            </div>

        </div>
    </div>


    <script src="styles y scrip/scrip.js"></script>
</body>

</html>
