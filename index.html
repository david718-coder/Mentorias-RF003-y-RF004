<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Educativo - Inicio de Sesión</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- PANEL DE ROLES -->
        <div class="panel-container" id="rolPanel">
            <div class="panel-header">
                <div class="logo-section">
                    <img src="imagenes/bibloteca.jpg" alt="Biblioteca Logo" class="logo">
                </div>
                <h1 class="main-title">Sistema Educativo</h1>
                <p class="subtitle">Selecciona tu rol para continuar</p>
            </div>

            <div class="roles-grid">
                <div class="role-card" onclick="seleccionarRol('administrador')">
                    <div class="role-icon">👨‍💼</div>
                    <h2 class="role-title">Administrador</h2>
                    <p class="role-description">Gestiona usuarios y sistema</p>
                </div>

                <div class="role-card" onclick="seleccionarRol('docente')">
                    <div class="role-icon">👨‍🏫</div>
                    <h2 class="role-title">Docente</h2>
                    <p class="role-description">Administra cursos y notas</p>
                </div>

                <div class="role-card" onclick="seleccionarRol('estudiante')">
                    <div class="role-icon">👨‍🎓</div>
                    <h2 class="role-title">Estudiante</h2>
                    <p class="role-description">Consulta materias y progreso</p>
                </div>
            </div>
        </div>

        <!-- PANEL DE LOGIN -->
        <div class="panel-container login-panel" id="loginPanel" style="display: none;">
            <button class="btn-back" onclick="volverARoles()">← Atrás</button>
            
            <div class="login-content">
                <div class="login-visual">
                    <img src="imagenes/bibloteca.jpg" alt="Biblioteca" class="login-image">
                </div>

                <div class="login-form-wrapper">
                    <div class="login-header">
                        <h1 id="rolTitulo">Bienvenido</h1>
                        <p id="rolSubtitulo">La educación es el arma más poderosa para cambiar el mundo</p>
                    </div>

                    <form onsubmit="iniciarSesion(event)" class="login-form">
                        <div class="form-group">
                            <label for="username">Nombre de Usuario</label>
                            <input 
                                type="text" 
                                id="username" 
                                placeholder="Ingresa tu nombre de usuario"
                                required
                            >
                        </div>

                        <div class="form-group">
                            <label for="password">Contraseña</label>
                            <input 
                                type="password" 
                                id="password" 
                                placeholder="Ingresa tu contraseña"
                                required
                            >
                        </div>

                        <button type="submit" class="btn-login">Ingresar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="scrip.js"></script>
</body>
</html>
