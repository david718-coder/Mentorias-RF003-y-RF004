<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentory Master</title>
    <link rel="stylesheet" href="../CSS/styles.css">

</head>
<body>
    <header class="reg">
        <h2>Inicia tu registro</h2>
    </header>
    <fieldset>
        <legend>Registro</legend>
        <p>Por Favor llene los datos completos y correctamente.</p>
        <form action="" method="post">
          <label for="nombre">Nombre completo: </label><br>
          <input type="text" id="nombre" name="nombre" required><br><br>

          <label for="email">Usuario: </label><br>
          <input type="email" id="email" name="email" required><br><br>

          <label for="password">Contraseña: </label><br>
          <input type="password" id="password" name="password" minlength="8" required><br><br>

          <label for="confirmar">Confirmar contraseña: </label><br>
          <input type="password" id="confirmar" name="confirmar" minlength="8" required><br><br>

          <label for="fecha">Fecha de nacimiento: </label><br>
          <input type="date" id="fecha" name="fecha" required><br><br>

          <label for="">Género: </label>
          <input type="radio" name="genero" required />Masculino
          <input type="radio" name="genero" />Femenino
          <input type="radio" name="genero" />Otro<br /><br />

          <label for="rol">Seleccione su rol:</label>
          <select id="rol" name="rol" required >
          <option value="" disabled selected>Elija una opción</option>
          <option value="estudiante">Estudiante</option>
          <option value="docente">Docente</option>
          <option value="admin">Administrador</option>
          </select> <br><br>


          <label for="">¿Acepta términos y condiciones?</label>
          <input type="checkbox" required /><br />
          <a href="tyc.html">Términos y condiciones (?)</a><br><br>

          <button type="reset" class="cta">Cancelar </button>
          <button type="submit" class="cta"> Registrarse </button><br>
        </form>
    <p><a href="recuperar.html">¿Olvidó la contraseña?</a></p>
    <a href="../index.html">Regresar al inicio</a>
    </fieldset>
    <div class="img">
        <img src="/images/logo-mentory-master.png" alt="Logo Mentory Master">
    </div>
</body>
</html>
